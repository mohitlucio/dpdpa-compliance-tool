# Render Blueprint — https://render.com/docs/blueprint-spec
# Deploys this app as a free Node web service.
# Secrets (SMTP_USER, SMTP_PASS, etc.) are marked sync:false so they are NEVER
# stored in this file or in git — Render asks you for them in the dashboard.
services:
  - type: web
    name: dpdpa-compliance-tool
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: SMTP_HOST
        value: smtp.gmail.com
      - key: SMTP_PORT
        value: "465"
      - key: SMTP_SECURE
        value: "true"
      - key: FROM_NAME
        value: Trilegal
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
      - key: FROM_EMAIL
        sync: false
      - key: BCC_EMAIL
        sync: false
