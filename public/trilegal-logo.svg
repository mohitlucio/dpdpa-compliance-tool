<svg viewBox="0 0 430 92" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Trilegal">
  <g fill="#003E5C">
    <!-- three-pillar mark with framing brackets -->
    <rect x="6"  y="22" width="20" height="7"/>   <!-- top-left serif -->
    <rect x="18" y="22" width="7"  height="48"/>  <!-- left bar -->
    <rect x="32" y="8"  width="7"  height="76"/>  <!-- centre tall bar -->
    <rect x="46" y="22" width="7"  height="48"/>  <!-- right bar -->
    <rect x="45" y="63" width="20" height="7"/>   <!-- bottom-right serif -->
  </g>
  <text x="92" y="62" font-family="Arial, Helvetica, sans-serif" font-size="48" font-weight="700" letter-spacing="3" fill="#003E5C">TRILEGAL</text>
</svg>
