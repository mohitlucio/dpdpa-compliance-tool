<svg viewBox="0 0 1200 540" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Digital data protection">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0a1c34"/>
      <stop offset="0.5" stop-color="#0c2a4d"/>
      <stop offset="0.55" stop-color="#0d2a50"/>
      <stop offset="1" stop-color="#071528"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#3db4ff" stop-opacity="0.55"/>
      <stop offset="1" stop-color="#3db4ff" stop-opacity="0"/>
    </radialGradient>
    <filter id="soft" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="4"/>
    </filter>
  </defs>

  <!-- base -->
  <rect width="1200" height="540" fill="#0b203c"/>
  <rect width="1200" height="540" fill="url(#bg)"/>

  <!-- circuit / data-sheet texture (left) -->
  <g stroke="#1d4d7e" stroke-width="1.2" opacity="0.5">
    <line x1="60"  y1="90"  x2="560" y2="90"/>
    <line x1="60"  y1="130" x2="430" y2="130"/>
    <line x1="60"  y1="170" x2="500" y2="170"/>
    <line x1="60"  y1="210" x2="360" y2="210"/>
    <line x1="60"  y1="250" x2="540" y2="250"/>
    <line x1="60"  y1="290" x2="410" y2="290"/>
    <line x1="60"  y1="330" x2="500" y2="330"/>
    <line x1="60"  y1="370" x2="350" y2="370"/>
    <line x1="60"  y1="410" x2="520" y2="410"/>
    <line x1="60"  y1="450" x2="430" y2="450"/>
  </g>
  <g fill="#2a6097" opacity="0.55">
    <rect x="120" y="110" width="26" height="10" rx="2"/>
    <rect x="240" y="150" width="40" height="10" rx="2"/>
    <rect x="160" y="190" width="20" height="10" rx="2"/>
    <rect x="300" y="230" width="34" height="10" rx="2"/>
    <rect x="120" y="270" width="48" height="10" rx="2"/>
    <rect x="220" y="310" width="22" height="10" rx="2"/>
    <rect x="340" y="350" width="30" height="10" rx="2"/>
    <rect x="150" y="390" width="40" height="10" rx="2"/>
    <rect x="280" y="430" width="26" height="10" rx="2"/>
  </g>
  <!-- faint geometric shards (lower-left) -->
  <g stroke="#1b4674" stroke-width="1.4" fill="none" opacity="0.5">
    <polygon points="80,470 180,440 200,520 100,540"/>
    <polygon points="200,500 300,470 340,540 240,540"/>
    <polygon points="40,400 110,380 130,440 60,460"/>
  </g>

  <!-- dial under padlock -->
  <g transform="translate(820,330)">
    <ellipse cx="0" cy="120" rx="240" ry="60" fill="#0a1c34" opacity="0"/>
    <circle r="190" fill="none" stroke="#1f567f" stroke-width="10" opacity="0.5"/>
    <circle r="160" fill="none" stroke="#2a6f9e" stroke-width="3" opacity="0.6"/>
    <circle r="150" fill="none" stroke="#3db4ff" stroke-width="2" stroke-dasharray="6 10" opacity="0.7"/>
    <g stroke="#3db4ff" stroke-width="2" opacity="0.6">
      <line x1="-190" y1="0" x2="-150" y2="0"/>
      <line x1="150" y1="0" x2="190" y2="0"/>
      <line x1="0" y1="150" x2="0" y2="190"/>
    </g>
  </g>

  <!-- glow behind lock -->
  <circle cx="820" cy="280" r="230" fill="url(#glow)"/>

  <!-- padlock -->
  <g transform="translate(820,300)" stroke="#5ec8ff" stroke-linecap="round" stroke-linejoin="round">
    <!-- shackle -->
    <path d="M -70 -40 V -90 A 70 70 0 0 1 70 -90 V -40" fill="none" stroke-width="20" filter="url(#soft)" opacity="0.6"/>
    <path d="M -70 -40 V -90 A 70 70 0 0 1 70 -90 V -40" fill="none" stroke-width="14"/>
    <!-- body -->
    <rect x="-115" y="-40" width="230" height="190" rx="22" fill="#3db4ff" fill-opacity="0.12" stroke-width="6" filter="url(#soft)" opacity="0.7"/>
    <rect x="-115" y="-40" width="230" height="190" rx="22" fill="#3db4ff" fill-opacity="0.10" stroke-width="3"/>
    <!-- inner circuit lines on body -->
    <g stroke="#7fd4ff" stroke-width="1.6" opacity="0.7">
      <line x1="-115" y1="20" x2="-35" y2="20"/>
      <line x1="60" y1="20" x2="115" y2="20"/>
      <line x1="-90" y1="110" x2="-20" y2="110"/>
      <line x1="30" y1="110" x2="115" y2="110"/>
    </g>
    <!-- keyhole -->
    <circle cx="0" cy="40" r="22" fill="none" stroke-width="4"/>
    <path d="M -8 55 L 8 55 L 14 95 L -14 95 Z" fill="#3db4ff" fill-opacity="0.25" stroke-width="3"/>
  </g>
</svg>
